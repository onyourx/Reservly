# Shopify app configuration for "Reservly".
# Linked to the Partner-dashboard app; `shopify app deploy` from apps/booking
# publishes the theme extension + this config.
name = "reservly"
client_id = "575f34ce7f7e8707d2dd9c29078525ca"
application_url = "https://bookings.example.com"
embedded = false

[access_scopes]
scopes = "read_products,write_products,read_orders,read_customers"

[auth]
redirect_urls = ["https://bookings.example.com/auth/callback"]

[webhooks]
api_version = "2025-07"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "https://bookings.example.com/webhooks/shopify/orders-create"

  # Mandatory privacy webhooks (GDPR/CCPA) — required for apps handling customer data.
  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "https://bookings.example.com/webhooks/shopify/compliance"

# App Proxy: storefront widget calls /apps/booking/* on the shop domain; Shopify
# signs and forwards to our server's /proxy/* routes.
[app_proxy]
url = "https://bookings.example.com/proxy"
subpath = "booking"
prefix = "apps"

[build]
automatically_update_urls_on_dev = true
